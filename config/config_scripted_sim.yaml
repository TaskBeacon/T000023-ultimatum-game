subinfo_fields:
- name: subject_id
  type: int
  constraints:
    min: 101
    max: 999
    digits: 3
subinfo_mapping:
  subject_id: 被试编号（3位）
  Participant Information: 被试信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: '{field} 输入无效'
window:
  size:
  - 1280
  - 720
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60
task:
  task_name: ultimatum_game
  save_path: ./outputs/sim
  total_blocks: 1
  total_trials: 9
  trial_per_block: 9
  conditions:
  - fair
  - unfair
  - very_unfair
  key_list:
  - f
  - j
  seed_mode: same_across_sub
  delta: 1
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
timing:
  cue_duration: 0.3
  anticipation_duration: 0.4
  offer_duration: 0.5
  decision_feedback_duration: 0.3
  feedback_duration: 0.4
  iti_duration: 0.3
stimuli:
  fixation:
    type: text
    text: +
    color: white
    height: 48
    font: SimHei
  instruction_text:
    type: text
    text: '最后通牒博弈任务（Scripted Sim）


      按空格键开始。

      '
    color: white
    height: 28
    wrapWidth: 980
    font: SimHei
  offer_cue:
    type: text
    text: '对方正在提出分配方案

      请准备做出决定

      '
    color: white
    height: 34
    wrapWidth: 980
    font: SimHei
  offer_panel:
    type: text
    text: '分配方案

      对方获得：{proposer_share} 分

      你获得：{responder_share} 分

      '
    color: white
    height: 40
    wrapWidth: 980
    font: SimHei
  decision_accept:
    type: text
    text: 你选择了：接受
    color: green
    height: 40
    font: SimHei
  decision_reject:
    type: text
    text: 你选择了：拒绝
    color: red
    height: 40
    font: SimHei
  decision_timeout:
    type: text
    text: 未作答，按拒绝处理
    color: yellow
    height: 40
    font: SimHei
  payoff_feedback:
    type: text
    text: '本轮你获得：{earned} 分

      当前累计：{total_earned} 分

      '
    color: white
    height: 38
    wrapWidth: 980
    font: SimHei
  block_break:
    type: text
    text: 'Scripted Sim 区块结束

      接受率：{accept_rate:.1%}

      本区块收益：{block_earned} 分

      累计收益：{total_earned} 分


      按空格键继续。

      '
    color: white
    height: 26
    wrapWidth: 980
    font: SimHei
  good_bye:
    type: text
    text: 'Scripted Sim 结束

      最终收益：{total_earned} 分


      按空格键退出。

      '
    color: white
    height: 30
    wrapWidth: 980
    font: SimHei
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    fair_cue_onset: 20
    unfair_cue_onset: 21
    very_unfair_cue_onset: 22
    fair_anticipation_onset: 23
    unfair_anticipation_onset: 24
    very_unfair_anticipation_onset: 25
    fair_offer_onset: 30
    unfair_offer_onset: 31
    very_unfair_offer_onset: 32
    decision_response: 50
    decision_timeout: 51
    decision_feedback_onset: 52
    payoff_feedback_onset: 53
    iti_onset: 60
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
  timing:
    post_delay_ms: 1
  policy:
    strict: false
controller:
  seed: 23023
  enable_logging: true
  offer_profiles:
    fair:
      label: 公平
      proposer_share: 5
      responder_share: 5
    unfair:
      label: 不公平
      proposer_share: 7
      responder_share: 3
    very_unfair:
      label: 极不公平
      proposer_share: 9
      responder_share: 1
sim:
  output_dir: outputs/sim
  seed: 23023
  participant_id: sim001
  session_id: sub-sim001_task-ultimatum_game_seed23023
  log_path: outputs/sim/sub-sim001_task-ultimatum_game_seed23023_sim_events.jsonl
  policy: warn
  default_rt_s: 0.2
  clamp_rt: false
  responder:
    type: scripted
    kwargs:
      key: f
      rt_s: 0.25
